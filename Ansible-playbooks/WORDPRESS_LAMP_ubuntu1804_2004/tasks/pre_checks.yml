- name: Verify target OS is Ubuntu
  fail:
    msg: "Este playbook requiere Ubuntu"
  when: ansible_distribution != "Ubuntu"

- name: Verify minimum RAM (2GB required)
  fail:
    msg: "Se requieren al menos 2GB de RAM para el stack LAMP con MySQL"
  when: ansible_memtotal_mb < (2 * 1024 * 0.9) | int

- name: Verify minimum disk space (10GB required)
  fail:
    msg: "Se requieren al menos 10GB de disco para el stack LAMP"
  when: ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_total') | first < (10 * 1024 * 1024 * 1024 * 0.9) | int