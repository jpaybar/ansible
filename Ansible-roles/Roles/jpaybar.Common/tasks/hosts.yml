---
# tasks/hosts.yml — jpaybar.Common
# Gestión de /etc/hosts
# Modo dinámico: añade automáticamente los hosts del play actual
# Modo estático: añade hosts fijos definidos en common_extra_hosts
# Ambos modos son compatibles y complementarios

# =============================================================================
# Modo dinámico — hosts del inventario participantes en el play
# =============================================================================

- name: Añadir hosts del play a /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ hostvars[item]['ansible_host'] }} {{ item }} {{ item }}.{{ common_hosts_domain }}"
    regexp: "^.*{{ item }}.*$"
    state: present
  loop: "{{ ansible_play_hosts }}"
  when: common_manage_hosts | bool

# =============================================================================
# Modo estático — hosts fijos fuera del inventario
# =============================================================================

- name: Añadir hosts estáticos a /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ item.ip }} {{ item.name }} {{ item.fqdn }}"
    regexp: "^.*{{ item.name }}.*$"
    state: present
  loop: "{{ common_extra_hosts }}"
  when: common_extra_hosts | length > 0

# =============================================================================
# Verificación
# =============================================================================

- name: Mostrar contenido de /etc/hosts
  ansible.builtin.command: cat /etc/hosts
  register: hosts_content
  changed_when: false

- name: Mostrar /etc/hosts
  ansible.builtin.debug:
    var: hosts_content.stdout_lines
