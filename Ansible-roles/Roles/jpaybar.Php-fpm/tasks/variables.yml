---
# vars file for jpaybar.Php-fpm

#=========================== OS VARIABLES ================================
- name: Include OS-specific variables
  include_vars: "{{ item }}"
  with_items:
    - "{{ ansible_facts['distribution'] | lower }}_vars.yml"
    #- "{{ ansible_facts['distribution'] | lower }}_config.yml"
#=========================================================================

#======================= PHP VERSIONS FOR UBUNTU =========================
- name: Include PHP version for Ubuntu 18.04
  include_vars: ubuntu_1804_php_version.yml
  when: ansible_facts['distribution_version'] == "18.04"
 
- name: Include PHP version for Ubuntu 20.04
  include_vars: ubuntu_2004_php_version.yml
  when: ansible_facts['distribution_version'] == "20.04"
  
- name: Include PHP version for Ubuntu 22.04
  include_vars: ubuntu_2204_php_version.yml
  when: ansible_facts['distribution_version'] == "22.04"

- name: Include PHP version for Ubuntu 24.04
  include_vars: ubuntu_2404_php_version.yml
  when: ansible_facts['distribution_version'] == "24.04"
#=========================================================================

