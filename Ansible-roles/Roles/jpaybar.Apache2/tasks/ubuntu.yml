---
# tasks file for jpaybar.Apache2

############################################# APACHE SETUP ######################################################
- name: Install Apache and OpenSSL
  apt:
    name: "{{ install_packages }}"
    state: present
    update_cache: yes

####################################### ENABLE APACHE MODS ######################################################
- name: Enable Apache mods
  apache2_module:
    name: "{{ item }}"
    state: present
  loop: "{{ apache_mods }}"
  notify: Reload Apache

##################################### SELF-SIGNED SSL CERT SETUP ################################################
- name: Generate self-signed certificate
  command: >
    openssl req -x509 -nodes -days 365
    -newkey rsa:2048
    -keyout {{ apache_key_path }}
    -out {{ apache_cert_path }}
    -subj "/CN={{ apache_server_name }}"
  args:
    creates: "{{ apache_cert_path }}"

- name: Copy default-ssl vhost config
  template:
    src: default-ssl.conf.j2
    dest: /etc/apache2/sites-available/default-ssl.conf
  notify: Reload Apache

############################################## SITE SETUP #######################################################
- name: Enable default SSL site
  command: a2ensite default-ssl
  notify: Reload Apache

- name: Disable default HTTP site
  command: a2dissite 000-default.conf
  notify: Reload Apache

- name: Ensure Apache is started and enabled
  service:
    name: apache2
    state: started
    enabled: yes