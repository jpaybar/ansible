[defaults]
# Desactiva la verificación del fingerprint SSH en las conexiones directas de Ansible.
# Sin esto, Ansible pregunta confirmación al conectar a un host nuevo o cuyo fingerprint cambió.
# Imprescindible en entornos de lab donde las VMs se destruyen y recrean continuamente
# (cada recreación genera nuevas claves SSH, lo que causaría errores de fingerprint).
host_key_checking = False

# Tiempo máximo en segundos para establecer la conexión SSH inicial.
# 60s es razonable para entornos locales con OpenStack; aumentar si hay latencia alta.
timeout = 60

[privilege_escalation]
# Tiempo máximo en segundos para que sudo/become complete la escalada de privilegios.
# 60s cubre casos de sistemas lentos o con PAM configurado con delays.
become_timeout = 60

[ssh_connection]
# Opciones adicionales pasadas directamente al cliente SSH en todas las conexiones.
#
# -o StrictHostKeyChecking=no
#   Equivalente a host_key_checking=False pero aplicado a nivel SSH, no solo Ansible.
#   CRÍTICO para ProxyJump: host_key_checking=False solo afecta a la conexión final,
#   pero los nodos intermedios del salto (ProxyJump) los gestiona SSH directamente,
#   ignorando la configuración de Ansible. Esta opción cubre todos los saltos.
#
# -o UserKnownHostsFile=/dev/null
#   Redirige el fichero known_hosts a /dev/null (la papelera del sistema).
#   Los fingerprints nunca se guardan ni se leen, ni para conexiones directas
#   ni para nodos intermedios de ProxyJump. Elimina definitivamente el problema
#   de fingerprints obsoletos entre despliegues sucesivos de Terraform.
#   SOLO recomendado en entornos de lab — en producción usar known_hosts real.
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null